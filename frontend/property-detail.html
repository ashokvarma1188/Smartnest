<!-- Property detail page — full info + image gallery + contact owner -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartNest — Property Details</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/property-detail.css">
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span>SmartNest</div>
  <a href="browse-properties.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to browse
  </a>
</div>

<div class="page" id="pageContent">
  <div class="loading-state">
    <div class="spinner"></div>
    Loading property…
  </div>
</div>

<!-- CONTACT MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h3>Contact Owner</h3>
      <button class="close-x" id="closeModal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
      </button>
    </div>
    <div class="modal-rows" id="modalRows"></div>
    <p class="modal-note">SmartNest connects you directly — no middleman, no commission.</p>
  </div>
</div>

<script src="./js/toast.js"></script>
<script src="js/property-detail.js"></script>
</body>
</html>
