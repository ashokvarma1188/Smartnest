<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartNest — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:        #0F2236;
    --ink-deep:   #0A1928;
    --line:       #4E7A9C;
    --line-soft:  rgba(78,122,156,0.35);
    --paper:      #F6F4EE;
    --paper-dim:  #E9E5D8;
    --brass:      #C98A35;
    --brass-dark: #A56F23;
    --ok:         #4C7A5E;
    --err:        #B6493A;
    --text-on-ink: #E8EEF3;
    --text-muted-ink: #9FB6C9;
    --text-dark:  #1B2430;
    --text-muted-dark: #6B7280;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif;
    background:var(--ink);
    position:relative; overflow:hidden;
  }

  body::before{
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(var(--line-soft) 1px, transparent 1px) 0 0/40px 40px,
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px) 0 0/40px 40px;
    pointer-events:none;
  }

  .card{
    position:relative; z-index:2;
    background:var(--paper);
    border-radius:16px;
    padding:40px 36px;
    width:100%; max-width:400px;
    margin:20px;
  }

  .back-link{
    display:inline-flex; align-items:center; gap:6px;
    font-size:13px; color:var(--text-muted-dark);
    text-decoration:none; margin-bottom:24px;
    transition:color .15s ease;
  }
  .back-link:hover{ color:var(--brass-dark); }
  .back-link svg{ width:14px; height:14px; }

  .wordmark{
    display:flex; align-items:center; gap:8px;
    font-size:13px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--text-muted-dark); margin-bottom:20px;
  }
  .wordmark .dot{ width:6px; height:6px; border-radius:50%; background:var(--brass); }

  h1{
    font-family:'Fraunces', serif; font-weight:500; font-size:26px;
    margin:0 0 6px; color:var(--text-dark);
  }
  .lede{ font-size:14px; color:var(--text-muted-dark); margin:0 0 28px; line-height:1.5; }

  .field{ margin-bottom:16px; }
  .field label{
    display:block; font-size:12px; font-weight:600;
    letter-spacing:0.04em; text-transform:uppercase;
    color:var(--text-muted-dark); margin-bottom:6px;
  }
  .input-shell{
    position:relative;
    border:1.5px solid var(--paper-dim); background:#fff;
    border-radius:8px; transition:border-color .15s ease, box-shadow .15s ease;
  }
  .input-shell:focus-within{
    border-color:var(--brass);
    box-shadow:0 0 0 3px rgba(201,138,53,0.15);
  }
  .field input{
    width:100%; border:none; background:transparent; outline:none;
    font:inherit; font-size:15px; padding:12px 14px; color:var(--text-dark);
  }
  .toggle-pw{
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer;
    font-size:12px; color:var(--text-muted-dark); font-weight:600; padding:4px 6px;
  }
  .toggle-pw:hover{ color:var(--brass-dark); }

  button.submit{
    width:100%; border:none; border-radius:8px;
    background:var(--ink); color:var(--text-on-ink);
    font:inherit; font-size:15px; font-weight:600;
    padding:13px; cursor:pointer; margin-top:6px;
    transition:background .15s ease;
  }
  button.submit:hover{ background:var(--ink-deep); }
  button.submit:disabled{ opacity:0.65; cursor:not-allowed; }

  .status{
    margin-top:14px; font-size:13.5px; border-radius:7px;
    padding:10px 12px; display:none; line-height:1.45;
  }
  .status.show{ display:block; }
  .status.error{ background:rgba(182,73,58,0.1); color:var(--err); border:1px solid rgba(182,73,58,0.25); }
  .status.ok{ background:rgba(76,122,94,0.1); color:var(--ok); border:1px solid rgba(76,122,94,0.25); }
</style>
</head>
<body>

<div class="card">

  <a href="login.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to login
  </a>

  <div class="wordmark"><span class="dot"></span> SmartNest</div>

  <h1>Reset your password</h1>
  <p class="lede">Enter your email and choose a new password. We'll update it right away.</p>

  <form id="resetForm" novalidate>
    <div class="field">
      <label for="email">Email</label>
      <div class="input-shell">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
    </div>

    <div class="field">
      <label for="newPassword">New Password</label>
      <div class="input-shell">
        <input type="password" id="newPassword" placeholder="Min 6 characters" required />
        <button type="button" class="toggle-pw" id="togglePw">SHOW</button>
      </div>
    </div>

    <div class="field">
      <label for="confirmPassword">Confirm New Password</label>
      <div class="input-shell">
        <input type="password" id="confirmPassword" placeholder="Same password again" required />
      </div>
    </div>

    <button type="submit" class="submit" id="submitBtn">
      <span id="submitLabel">Reset Password</span>
    </button>

    <div class="status" id="statusBox"></div>
  </form>

</div>

<script>
  const API_BASE = "http://localhost:4000/api";

  const togglePw = document.getElementById('togglePw');
  const newPasswordEl = document.getElementById('newPassword');

  togglePw.addEventListener('click', () => {
    const isHidden = newPasswordEl.type === 'password';
    newPasswordEl.type = isHidden ? 'text' : 'password';
    togglePw.textContent = isHidden ? 'HIDE' : 'SHOW';
  });

  function showStatus(msg, kind){
    const box = document.getElementById('statusBox');
    box.textContent = msg;
    box.className = 'status show ' + kind;
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email       = document.getElementById('email').value.trim();
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!email || !newPassword || !confirmPassword){
      showStatus("Please fill in all fields.", "error"); return;
    }
    if (newPassword.length < 6){
      showStatus("Password must be at least 6 characters.", "error"); return;
    }
    if (newPassword !== confirmPassword){
      showStatus("Passwords do not match.", "error"); return;
    }

    const btn   = document.getElementById('submitBtn');
    const label = document.getElementById('submitLabel');
    btn.disabled = true;
    label.textContent = "Updating…";

    try {
      const res  = await fetch(`${API_BASE}/auth/reset-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, newPassword })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.message || "Something went wrong.");

      showStatus("Password updated! Redirecting to login…", "ok");
      setTimeout(() => window.location.href = "login.html", 2000);

    } catch (err) {
      showStatus(err.message, "error");
      btn.disabled = false;
      label.textContent = "Reset Password";
    }
  });
</script>

</body>
</html>
